<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CustomTee | Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header mb-4 border-bottom border-danger border-3">
    <nav class="navbar navbar-dark navbar-expand-lg container">
      <a class="navbar-brand brand-logo" href="index.html">
        <span class="brand-fe">Custom</span><span class="text-white">Tee</span> <span class="badge bg-danger ms-2">Admin</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <!-- JS render menu -->
      </div>
    </nav>
  </header>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold m-0">Bảng Điều Khiển Admin</h1>
        <button id="btn-clear" class="btn btn-outline-danger btn-sm">Reset Toàn Bộ Data</button>
    </div>
    
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white h-100 border-0">
                <div class="card-body">
                    <h6 class="card-title text-white-50">Khách Hàng</h6>
                    <h2 class="display-5 fw-bold mb-0" id="admin-user-count">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark h-100 border-0">
                <div class="card-body">
                    <h6 class="card-title text-black-50">Đơn Chờ In</h6>
                    <h2 class="display-5 fw-bold mb-0" id="admin-order-count">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white h-100 border-0">
                <div class="card-body">
                    <h6 class="card-title text-white-50">Doanh Thu</h6>
                    <h2 class="display-5 fw-bold mb-0" id="admin-revenue">0đ</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-panel">
        <h4 class="mb-3 fw-bold">Danh Sách Đơn Hàng Toàn Hệ Thống</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Mã Đơn</th>
                        <th>User</th>
                        <th>Chi tiết in</th>
                        <th>Tổng tiền</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="admin-all-orders">
                    <!-- Render by JS -->
                </tbody>
            </table>
        </div>
    </div>
  </main>

  <footer class="site-footer mt-5">
    <div class="container py-3 text-center text-secondary small">
      <p class="mb-0">&copy; <span id="year"></span> CustomTee - Xây dựng theo cấu trúc FE Shop.</p>
    </div>
  </footer>

  <script type="module">
    import { updateNavbar, formatCurrency } from './js/utils.js';
    import { getCurrentUser, getUsers } from './js/auth.js';

    updateNavbar();

    const currentUser = getCurrentUser();
    if(!currentUser || currentUser.role !== 'admin') {
        alert('Trang này dành riêng cho Quản trị viên!');
        window.location.href = 'index.html';
    }

    function renderAdmin() {
        const users = getUsers().filter(u => u.role === 'user');
        const orders = JSON.parse(localStorage.getItem('DB_ORDERS')) || [];

        document.getElementById('admin-user-count').innerText = users.length;
        document.getElementById('admin-order-count').innerText = orders.length;

        const totalRev = orders.reduce((sum, o) => sum + o.total, 0);
        document.getElementById('admin-revenue').innerText = formatCurrency(totalRev);

        const tbody = document.getElementById('admin-all-orders');
        if (orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-muted">Chưa có đơn hàng nào</td></tr>';
            return;
        }

        tbody.innerHTML = orders.reverse().map(o => `
            <tr>
                <td class="font-monospace fw-bold">${o.id}</td>
                <td><span class="badge bg-info text-dark">${o.user}</span></td>
                <td class="small lh-sm">${o.items}</td>
                <td class="fw-bold text-danger">${formatCurrency(o.total)}</td>
                <td>
                    <button class="btn btn-sm btn-dark btn-print" data-id="${o.id}">
                        In ngay
                    </button>
                </td>
            </tr>
        `).join('');

        document.querySelectorAll('.btn-print').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = e.target.getAttribute('data-id');
                alert(`Đã gửi lệnh in cho đơn ${id} tới máy in ESP32 (Mô phỏng)`);
            });
        });
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        if (confirm('Bạn có chắc muốn xóa sạch toàn bộ Data (Users, Orders, Products)?')) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    });

    renderAdmin();
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
