<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CustomTee | Giỏ hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header mb-4">
    <nav class="navbar navbar-dark navbar-expand-lg container">
      <a class="navbar-brand brand-logo" href="index.html">
        <span class="brand-fe">Custom</span><span class="text-white">Tee</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <!-- JS render menu -->
      </div>
    </nav>
  </header>

  <main class="container my-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
        <li class="breadcrumb-item active" aria-current="page">Giỏ hàng</li>
      </ol>
    </nav>
    <h1 class="h3 mb-4 fw-bold">Giỏ Hàng Chờ In</h1>
    <div id="cart-table" class="glass-panel"></div>
    <div class="d-flex justify-content-between align-items-center mt-4">
      <a href="index.html" class="btn btn-outline-secondary">← Tiếp tục mua sắm</a>
      <a href="checkout.html" class="btn btn-primary btn-lg px-5">Xác Nhận Đặt In</a>
    </div>
  </main>

  <footer class="site-footer mt-5">
    <div class="container py-3 text-center text-secondary small">
      <p class="mb-0">&copy; <span id="year"></span> CustomTee - Xây dựng theo cấu trúc FE Shop.</p>
    </div>
  </footer>

  <script type="module">
    import { getCart, updateQty, removeItem, cartTotal } from './js/cart.js';
    import { formatCurrency, updateNavbar } from './js/utils.js';
    import { PRODUCTS } from './data/products.js';
    import { getCurrentUser } from './js/auth.js';

    updateNavbar();

    function render(){
      const currentUser = getCurrentUser();
      if(!currentUser) {
          document.getElementById('cart-table').innerHTML = `
            <div class="alert alert-warning text-center p-4">
              Bạn chưa đăng nhập. Vui lòng <a href="login.html" class="alert-link">Đăng nhập</a> để xem giỏ hàng.
            </div>`;
          return;
      }

      const cart = getCart();
      const rows = cart.map((item, index) => {
        const p = PRODUCTS.find(x => String(x.id)===String(item.id));
        const subtotal = (p?.price || 0) * item.qty;
        return `
          <tr>
            <td class="align-middle">
              <div class="d-flex align-items-center gap-3">
                <img src="${p?.image}" alt="${p?.name}" class="rounded border border-secondary" style="width:80px;height:80px;object-fit:cover">
                <div>
                  <div class="fw-bold">${p?.name || 'Sản phẩm'}</div>
                  <div class="text-primary small mb-1 bg-primary bg-opacity-10 px-2 py-1 rounded d-inline-block border border-primary border-opacity-25 mt-1">
                    <strong>Nội dung in:</strong> ${item.printText}
                  </div>
                  <div><button type="button" class="btn btn-link link-danger p-0 text-decoration-none small" data-remove="${index}">Xoá</button></div>
                </div>
              </div>
            </td>
            <td class="align-middle fw-semibold">${formatCurrency(p?.price || 0)}</td>
            <td class="align-middle" style="max-width:120px">
              <input class="form-control qty text-center" data-index="${index}" type="number" min="1" value="${item.qty}" />
            </td>
            <td class="align-middle fw-bold text-danger">${formatCurrency(subtotal)}</td>
          </tr>`;
      }).join('');

      const total = cartTotal(PRODUCTS);
      const html = cart.length ? `
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Chi tiết Áo</th>
                <th>Đơn Giá</th>
                <th style="width:140px">Số lượng</th>
                <th>Thành tiền</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr>
                <td colspan="3" class="text-end text-muted">Tổng thanh toán:</td>
                <td class="fw-bold fs-4 text-danger">${formatCurrency(total)}</td>
              </tr>
            </tfoot>
          </table>
        </div>` : `
        <div class="alert alert-info text-center p-4">
          Giỏ hàng của bạn đang trống. <a href="index.html" class="alert-link">Mua sắm ngay</a>.
        </div>`;

      document.getElementById('cart-table').innerHTML = html;

      document.querySelectorAll('input.qty').forEach(inp => {
        inp.addEventListener('change', () => {
          const index = inp.dataset.index;
          const qty = Math.max(1, parseInt(inp.value || '1', 10));
          inp.value = qty;
          updateQty(index, qty);
          render();
          updateNavbar();
        });
      });
      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          removeItem(btn.dataset.remove);
          render();
          updateNavbar();
        });
      });
    }

    document.getElementById('year').textContent = new Date().getFullYear();
    render();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
