<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CustomTee | Lịch sử đặt hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header mb-4">
    <nav class="navbar navbar-dark navbar-expand-lg container">
      <a class="navbar-brand brand-logo" href="index.html">
        <span class="brand-fe">Custom</span><span class="text-white">Tee</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <!-- JS render menu -->
      </div>
    </nav>
  </header>

  <main class="container my-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
        <li class="breadcrumb-item active" aria-current="page">Lịch sử đặt hàng</li>
      </ol>
    </nav>
    <h1 class="h3 mb-4 fw-bold">Lịch Sử Đặt Hàng</h1>
    
    <div class="glass-panel" id="history-container">
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Mã Đơn</th>
                        <th>Ngày Đặt</th>
                        <th>Chi Tiết Áo (Kèm nội dung in)</th>
                        <th>Tổng Tiền</th>
                        <th>Trạng Thái</th>
                    </tr>
                </thead>
                <tbody id="history-table">
                    <!-- Render by JS -->
                </tbody>
            </table>
        </div>
    </div>
  </main>

  <footer class="site-footer mt-5">
    <div class="container py-3 text-center text-secondary small">
      <p class="mb-0">&copy; <span id="year"></span> CustomTee - Xây dựng theo cấu trúc FE Shop.</p>
    </div>
  </footer>

  <script type="module">
    import { updateNavbar, formatCurrency } from './js/utils.js';
    import { getCurrentUser } from './js/auth.js';

    updateNavbar();

    const currentUser = getCurrentUser();
    if(!currentUser) {
        alert('Bạn cần đăng nhập để xem lịch sử!');
        window.location.href = 'login.html';
    }

    const orders = JSON.parse(localStorage.getItem('DB_ORDERS')) || [];
    const myOrders = orders.filter(o => o.user === currentUser.username);
    const tbody = document.getElementById('history-table');

    if (myOrders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">Bạn chưa đặt áo lần nào.</td></tr>`;
    } else {
        tbody.innerHTML = myOrders.reverse().map(o => `
            <tr>
                <td class="font-monospace fw-bold text-dark">${o.id}</td>
                <td class="text-muted small">${o.date}</td>
                <td class="small lh-sm">${o.items}</td>
                <td class="fw-bold text-danger">${formatCurrency(o.total)}</td>
                <td>
                    <span class="badge bg-warning text-dark border border-warning">
                        ${o.status}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
