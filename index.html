<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CustomTee | In Áo Theo Yêu Cầu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header mb-4">
    <nav class="navbar navbar-dark navbar-expand-lg container">
      <a class="navbar-brand brand-logo" href="index.html">
        <span class="brand-fe">Custom</span><span class="text-white">Tee</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <!-- JS render menu -->
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero-banner text-center">
      <h1 class="display-6 fw-bold">Dịch Vụ In Áo Thun Theo Yêu Cầu</h1>
      <p class="mb-0">Chọn mẫu áo và điền nội dung bạn muốn in. Chúng tôi sẽ lo phần còn lại!</p>
    </section>

    <section>
      <div class="row g-2 mb-4">
        <div class="col-12 col-md-8">
          <input id="search" type="search" class="form-control" placeholder="Tìm kiếm áo thun..." />
        </div>
        <div class="col-12 col-md-4">
          <select id="sort" class="form-select">
            <option value="All">Tất cả danh mục</option>
            <option value="Áo form rộng (Oversize)">Áo form rộng (Oversize)</option>
            <option value="Áo thể thao">Áo thể thao</option>
            <option value="Áo Polo">Áo Polo</option>
          </select>
        </div>
      </div>

      <div id="product-grid" class="row g-4"></div>
    </section>
  </main>

  <footer class="site-footer mt-5">
    <div class="container py-3 text-center text-secondary small">
      <p class="mb-0">&copy; <span id="year"></span> CustomTee - Xây dựng theo cấu trúc FE Shop.</p>
    </div>
  </footer>

  <script type="module">
    import { updateNavbar, loadProducts, getFilteredSorted } from './js/utils.js';
    import { PRODUCTS } from './data/products.js';

    updateNavbar();

    const grid = document.getElementById('product-grid');
    const search = document.getElementById('search');
    const sort = document.getElementById('sort');

    function render(items){
      grid.innerHTML = items.map(p => `
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
          <article class="card h-100 border-secondary">
            <a class="ratio ratio-4x3" href="product.html?id=${encodeURIComponent(p.id)}">
              <img src="${p.image}" alt="${p.name}" class="card-img-top object-fit-cover rounded-top">
            </a>
            <div class="card-body d-flex flex-column">
              <div class="text-muted small mb-1">${p.category} - ${p.color}</div>
              <h3 class="h6 flex-grow-1"><a class="link-dark text-decoration-none fw-bold" href="product.html?id=${encodeURIComponent(p.id)}">${p.name}</a></h3>
              <p class="price mb-3">${p.priceFmt}</p>
              <a href="product.html?id=${encodeURIComponent(p.id)}" class="btn btn-primary w-100">Chọn in áo này</a>
            </div>
          </article>
        </div>
      `).join('');
    }

    const products = loadProducts(PRODUCTS);
    render(products);

    function update(){
      const items = getFilteredSorted(products, search.value, sort.value);
      render(items);
    }
    search.addEventListener('input', update);
    sort.addEventListener('change', update);

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
